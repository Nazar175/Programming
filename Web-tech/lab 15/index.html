<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Слайдери</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"></script>
</head>
<body>

<h2>jQuery слайдер</h2>

<div class="sl_ctr">
    <div class="sldr">
        <img src="https://picsum.photos/450/300?random=1">
        <img src="https://picsum.photos/450/300?random=2">
        <img src="https://picsum.photos/450/300?random=3">
        <img src="https://picsum.photos/450/300?random=4">
    </div>
    <div class="prv_b"></div>
    <div class="nxt_b"></div>
</div>


<h2>Bootstrap слайдер</h2>

<div id="myCarousel" class="carousel slide" data-ride="carousel" style="max-width:800px; margin:auto;">

    <ol class="carousel-indicators">
        <li data-target="#myCarousel" data-slide-to="0" class="active"></li>
        <li data-target="#myCarousel" data-slide-to="1"></li>
        <li data-target="#myCarousel" data-slide-to="2"></li>
    </ol>

    <div class="carousel-inner">
        <div class="item active">
            <img src="https://picsum.photos/800/400?random=5">
        </div>
        <div class="item">
            <img src="https://picsum.photos/800/400?random=6">
        </div>
        <div class="item">
            <img src="https://picsum.photos/800/400?random=7">
        </div>
    </div>

    <a class="left carousel-control" href="#myCarousel" data-slide="prev">
        <span class="glyphicon glyphicon-chevron-left"></span>
    </a>

    <a class="right carousel-control" href="#myCarousel" data-slide="next">
        <span class="glyphicon glyphicon-chevron-right"></span>
    </a>
</div>


<h2>Vanilla JS слайдер</h2>

<div class="slider">
    <div class="slider-track">
        <div class="slide"><img src="https://picsum.photos/600/300?random=9"></div>
        <div class="slide"><img src="https://picsum.photos/600/300?random=10"></div>
        <div class="slide"><img src="https://picsum.photos/600/300?random=11"></div>
    </div>
    <button class="btn prev">‹</button>
    <button class="btn next">›</button>
</div>

<script src="demo.js"></script>

</body>
</html>

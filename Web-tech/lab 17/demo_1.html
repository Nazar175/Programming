        Що входить у послугу?

        У вартість входить консультація, супровід та технічна підтримка.
    </div>
</div>

<div class="faq-item">

    </div>

        Виконання займає від 1 до 3 днів залежно від складності.
    </div>
</div>

<div class="faq-item">
    <div class="faq-title" onclick="toggleFAQ('faq3')">
        Чи є гарантія?
    </div>
    <div id="faq3" class="faq-content">
        Так, ми надаємо гарантію на всі виконані роботи.
    </div>
</div>
